<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#0b1020"><title>Riftbound Survivors</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="styles.css?v=0.2.0"></head><body>
<div id="app">
  <canvas id="gameCanvas"></canvas>
  <section id="authScreen" class="screen active"><div class="auth-card"><div class="logo"><i>◆</i><h1>RIFTBOUND</h1><p>SURVIVORS</p></div><div class="tabs"><button data-auth-tab="login" class="active">دخول</button><button data-auth-tab="signup">حساب جديد</button></div><form id="authForm"><input id="email" type="email" placeholder="البريد الإلكتروني" required><input id="password" type="password" placeholder="كلمة المرور" minlength="6" required><input id="displayName" class="signup-only" placeholder="اسم اللاعب" maxlength="20"><button class="primary" type="submit">متابعة</button></form><button id="guestBtn" class="ghost">تجربة دون حساب</button><button id="resetPasswordBtn" class="text-btn">استرجاع كلمة المرور</button><p id="authMessage"></p></div></section>
  <section id="hubScreen" class="screen hub"><header class="topbar"><div class="player-chip"><span id="avatar">◆</span><div><b id="playerName">الناجي</b><small>المستوى <span id="accountLevel">1</span></small></div></div><div class="wallet"><span>● <b id="goldCount">0</b></span><span>◆ <b id="gemCount">0</b></span><span>⌘ <b id="keyCount">0</b></span></div><button id="settingsBtn" class="icon-btn">⚙</button></header><div class="hub-body"><div class="season-banner"><div><small>الموسم 01</small><h2>انكسار العوالم</h2><p>قاتل عبر ستة عوالم واجمع شظايا الصدع</p><div class="progress"><i id="seasonProgress"></i></div></div><span class="season-orb">◈</span></div><div class="hub-actions"><button id="playBtn" class="play-card"><span>▶</span><div><b>ابدأ الجولة</b><small>كوّن بناءك واصمد</small></div></button><button data-panel="roster">الشخصيات <b id="rosterCount">0/20</b></button><button data-panel="skills">شجرة المهارات</button><button data-panel="leaderboard">المتصدرون</button><button data-panel="missions">المهام</button><button data-panel="achievements">الإنجازات</button></div><div class="daily-strip"><button id="dailyBtn"><b>مكافأة اليوم</b><small id="dailyStatus">جاهزة</small></button><button id="wheelBtn"><b>عجلة الصدع</b><small>لفة مجانية يومياً</small></button><button data-panel="pass"><b>مسار الموسم</b><small>مكافآت مجانية</small></button></div></div></section>
  <section id="loadoutScreen" class="screen panel-screen"><header><button class="back">‹</button><div><h2>جهّز الناجي</h2><p>اختر الشخصية والعالم والنمط</p></div></header><h3>الشخصية</h3><div id="characterGrid" class="character-grid"></div><h3>العالم</h3><div id="mapGrid" class="option-row"></div><h3>النمط</h3><div id="modeGrid" class="option-row"></div><button id="startRunBtn" class="primary sticky">دخول الصدع</button></section>
  <section id="genericPanel" class="screen panel-screen"><header><button class="back">‹</button><div><h2 id="panelTitle"></h2><p id="panelSubtitle"></p></div></header><div id="panelContent"></div></section>
  <section id="gameHud" class="hud hidden"><div class="wave-box"><small>الموجة</small><b id="wave">1</b><span id="timer">00:30</span></div><div class="run-wallet">● <b id="runGold">0</b></div><div class="hud-bars"><div class="bar health"><i id="healthFill"></i><span id="healthText"></span></div><div class="bar xp"><i id="xpFill"></i><span id="levelText"></span></div></div><div id="weaponDock" class="weapon-dock"></div><button id="pauseBtn" class="pause-btn">Ⅱ</button><div id="stick" class="stick"><i></i></div></section>
  <section id="levelScreen" class="screen overlay"><div class="modal"><small>ارتقاء المستوى</small><h2>اختر تطويراً واحداً</h2><div id="levelChoices" class="level-grid"></div></div></section>
  <section id="shopScreen" class="screen overlay"><div class="modal shop"><header><div><small>انتهت الموجة</small><h2>تاجر الصدع</h2></div><b>● <span id="shopGold">0</span></b></header><div id="shopGrid" class="level-grid"></div><footer><button id="rerollBtn">تحديث <span></span></button><button id="nextWaveBtn" class="primary">الموجة التالية</button></footer></div></section>
  <section id="pauseScreen" class="screen overlay"><div class="modal compact"><h2>توقف مؤقت</h2><button id="resumeBtn" class="primary">متابعة</button><button id="quitBtn">إنهاء الجولة</button></div></section>
  <section id="resultsScreen" class="screen panel-screen results"><div class="result-emblem">◆</div><small>انتهت الجولة</small><h2 id="resultTitle"></h2><div id="resultStats" class="stat-grid"></div><div id="rewardList" class="reward-list"></div><button id="resultHomeBtn" class="primary">العودة للمقر</button></section>
  <div id="toast"></div>
</div><script type="module" src="src/app.js?v=0.2.0"></script></body></html>
